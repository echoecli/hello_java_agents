server:
  port: 1314
  servlet:
    encoding:
      charset: UTF-8
      enable: true
      force: true

spring:
  ai:
    dashscope:
      #阿里云百炼 apiKey
      api-key: sk-7920241a9b354c2b8b63ae49a4136166
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024
    vectorstore:
      redis:
        initialize-schema: true
        prefix: zwq_rag_prefix
        index-name: zwq_rag_index
    mcp:
      server:
        enabled: true
      client:
         type: async  # 与服务端一致，异步调用
         request-timeout: 60s # 调用超时时间，可根据实际调整
         toolcallback:
           enabled: true # 启用工具回调，用于接收服务端响应
         sse:
          connections:
          #和信订单mcp服务url
           hexin_order_server:
             url: http://localhost:8888

  data:
    redis:
      host: 192.168.110.22
      port: 6379

